name: "09 - Post Latest Video to Facebook"

# Instant test/retry button: posts the most recent UPLOADED video to the
# Facebook page (Reel -> video post -> link post fallback chain).
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - fb_request.txt

jobs:
  post-facebook:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Post latest uploaded video to Facebook
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
        run: python facebook_post.py
# end of workflow
