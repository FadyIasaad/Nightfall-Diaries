name: "03 - Create and Upload Now"

on:
  workflow_dispatch:
    inputs:
      video_type:
        description: "Which type to produce"
        required: true
        default: "horror_story"
        type: choice
        options:
          - short
          - horror_story
          - confession_story
      target_minutes:
        description: "Target length in minutes (ignored for short)"
        required: false
        default: ""
      custom_title:
        description: "Your exact video title. AI writes the story from it. Leave empty to use the next sheet idea."
        required: false
        default: ""
      custom_story:
        description: "Short story only (form box truncates long paste). For a FULL long story, leave this empty and put it in custom_story.txt in the repo instead."
        required: false
        default: ""
      parts:
        description: "How many parts (1 = one normal video)"
        required: false
        default: "1"
      parts_mode:
        description: "If parts > 1: separate uploads (Part 1, 2, ...) or chapters inside one video"
        required: false
        default: "separate_videos"
        type: choice
        options:
          - separate_videos
          - chapters
  # Editing render_request.txt and pushing = "render this type now", no UI needed.
  push:
    branches: [main]
    paths:
      - render_request.txt
  # Fully automatic schedule (times are UTC):
  #   daily short at 17:00, horror Wednesday 14:00, confession Saturday 14:00.
  schedule:
    - cron: "0 17 * * *"
    - cron: "0 14 * * 3"
    - cron: "0 14 * * 6"

# Never let two renders run at once (they race on the sheet row and quotas).
# A new one queues until the current one finishes.
concurrency:
  group: create-and-upload
  cancel-in-progress: false

jobs:
  create-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve video type
        id: vt
        env:
          PARTS_IN: ${{ inputs.parts }}
          MODE_IN: ${{ inputs.parts_mode }}
        run: |
          TYPE="${{ inputs.video_type }}"
          MINUTES="${{ inputs.target_minutes }}"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            case "${{ github.event.schedule }}" in
              "0 17 * * *") TYPE="short" ;;
              "0 14 * * 3") TYPE="horror_story" ;;
              "0 14 * * 6") TYPE="confession_story" ;;
            esac
          elif [ "${{ github.event_name }}" = "push" ]; then
            TYPE="$(head -1 render_request.txt | tr -d ' \r')"
          fi
          case "$TYPE" in
            short|horror_story|confession_story) ;;
            *) TYPE="horror_story" ;;
          esac
          # Parts: from the Run-workflow form, clamped to 1..10.
          PARTS="${PARTS_IN:-1}"
          case "$PARTS" in ''|*[!0-9]*) PARTS=1 ;; esac
          [ "$PARTS" -lt 1 ] && PARTS=1
          [ "$PARTS" -gt 10 ] && PARTS=10
          MODE="${MODE_IN:-separate_videos}"
          # Growth: the Friday scheduled short is a 3-part cliffhanger series
          # (Part 1/3, 2/3, 3/3 uploaded in order - pulls viewers to the channel).
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$TYPE" = "short" ] && [ "$(date -u +%u)" = "5" ]; then
            PARTS=3
            MODE="separate_videos"
          fi
          RUNS=1
          if [ "$MODE" = "separate_videos" ] && [ "$PARTS" -gt 1 ]; then
            RUNS="$PARTS"
          fi
          echo "type=$TYPE" >> "$GITHUB_OUTPUT"
          echo "minutes=$MINUTES" >> "$GITHUB_OUTPUT"
          echo "parts=$PARTS" >> "$GITHUB_OUTPUT"
          echo "parts_mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "runs=$RUNS" >> "$GITHUB_OUTPUT"
          echo "Producing video_type=$TYPE parts=$PARTS mode=$MODE render_passes=$RUNS (event: ${{ github.event_name }})"

          # Full custom story: the "Run workflow" form box is single-line and
          # truncates a pasted story. So the box is for short stories only;
          # for a full story, leave the box empty and put the text in
          # custom_story.txt at the repo root instead (any length, any number
          # of lines/paragraphs) - this step reads it here.
          STORY_INPUT="${{ inputs.custom_story }}"
          if [ -n "$STORY_INPUT" ]; then
            STORY="$STORY_INPUT"
            echo "Custom story source: workflow form input"
          elif [ -f custom_story.txt ]; then
            STORY="$(cat custom_story.txt)"
            echo "Custom story source: custom_story.txt ($(wc -w < custom_story.txt) words)"
          else
            STORY=""
          fi
          {
            echo "custom_story<<TBT_STORY_EOF"
            echo "$STORY"
            echo "TBT_STORY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg espeak-ng fonts-dejavu-core fonts-liberation

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate story
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TBT_VIDEO_TYPE: ${{ steps.vt.outputs.type }}
          TBT_TARGET_MINUTES: ${{ steps.vt.outputs.minutes }}
          TBT_CUSTOM_TITLE: ${{ github.event_name == 'workflow_dispatch' && inputs.custom_title || '' }}
          TBT_CUSTOM_STORY: ${{ steps.vt.outputs.custom_story }}
          TBT_PARTS: ${{ steps.vt.outputs.parts }}
          TBT_PARTS_MODE: ${{ steps.vt.outputs.parts_mode }}
        run: python generate_story.py

      - name: Generate video
        timeout-minutes: 300
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          POLLINATIONS_TOKEN: ${{ secrets.POLLINATIONS_TOKEN }}
          TBT_VIDEO_TYPE: ${{ steps.vt.outputs.type }}
        # Multi-part (separate videos): each pass renders the next GENERATED part row.
        run: |
          for i in $(seq 1 "${{ steps.vt.outputs.runs }}"); do
            echo "=== Render pass $i of ${{ steps.vt.outputs.runs }} ==="
            python generate_video.py
          done

      - name: Upload to YouTube
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_PRIVACY: "public"
          TBT_VIDEO_TYPE: ${{ steps.vt.outputs.type }}
        # Multi-part (separate videos): each pass uploads the next VIDEO_CREATED part.
        run: |
          for i in $(seq 1 "${{ steps.vt.outputs.runs }}"); do
            echo "=== Upload pass $i of ${{ steps.vt.outputs.runs }} ==="
            python upload_youtube.py
          done

      - name: Post to Facebook (optional)
        if: always()
        continue-on-error: true
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
        run: python facebook_post.py

      - name: Post to TikTok (optional)
        if: always()
        continue-on-error: true
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
        run: python tiktok_post.py

      - name: Upload render artifacts (debug aid, kept for 5 days)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightfall-diaries-output-${{ github.run_id }}
          path: output/
          retention-days: 5
# end of workflow
