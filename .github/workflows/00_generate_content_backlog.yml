name: 00 Generate Content Backlog

on:
  workflow_dispatch:
    inputs:
      video_type:
        description: "Which type to fill"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - short
          - bedtime
          - long_story
          - toby_collection
          - calming
          - adventure
      count_per_type:
        description: "Keep at least this many IDEA rows per selected type"
        required: true
        default: "20"

jobs:
  generate-backlog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fill Google Sheet with IDEA rows by type
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          TBT_VIDEO_TYPE: ${{ github.event.inputs.video_type }}
          TBT_COUNT_PER_TYPE: ${{ github.event.inputs.count_per_type }}
        run: python seed_content_ideas.py
