name: "08 - Reset Stale Stories to Ideas"

# Resets GENERATED (and orphaned VIDEO_CREATED) rows back to IDEA so the
# improved prompts rewrite them from scratch. Runs from the button, or
# automatically when cleanup_request.txt is pushed.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - cleanup_request.txt

concurrency:
  group: create-and-upload
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Reset stale stories
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python cleanup_generated_stories.py
# end of workflow
