name: "04 - Generate Story Only"

on:
  workflow_dispatch:
    inputs:
      video_type:
        description: "Which type to write"
        required: true
        default: "horror_story"
        type: choice
        options:
          - short
          - horror_story
          - confession_story
      target_minutes:
        description: "Target length in minutes (ignored for short)"
        required: false
        default: ""

jobs:
  generate-story:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run generate_story.py
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TBT_VIDEO_TYPE: ${{ inputs.video_type }}
          TBT_TARGET_MINUTES: ${{ inputs.target_minutes }}
        run: python generate_story.py
